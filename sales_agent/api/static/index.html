<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>Pharmacy Sales Agent — Test UI</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --fg: #f1f5f9; --muted: #94a3b8;
    --accent: #38bdf8; --ok: #4ade80; --warn: #fbbf24; --err: #f87171;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--fg); margin: 0; padding: 24px;
    max-width: 1100px; margin-inline: auto;
  }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { color: var(--muted); margin-bottom: 20px; font-size: 14px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 10px 18px; cursor: pointer; border: 1px solid transparent;
    border-bottom: none; border-radius: 6px 6px 0 0; font-size: 14px;
  }
  .tab.active { background: var(--surface); border-color: var(--border); color: var(--accent); }
  .panel { display: none; background: var(--surface); padding: 18px; border-radius: 0 8px 8px 8px; border: 1px solid var(--border); border-top: none; }
  .panel.active { display: block; }
  .example-row { margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .example-btn {
    padding: 4px 10px; font-size: 12px; background: #334155; color: var(--fg);
    border-radius: 4px; cursor: pointer; border: none;
  }
  .example-btn:hover { background: #475569; }
  label { display: block; margin-top: 10px; font-size: 13px; color: var(--muted); }
  textarea {
    width: 100%; padding: 10px; background: #0b1220; color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px; font-family: Menlo, monospace;
    font-size: 12.5px; min-height: 220px; resize: vertical;
  }
  button.primary {
    margin-top: 14px; padding: 10px 22px; background: var(--accent);
    color: #0b1220; border: none; border-radius: 6px; cursor: pointer;
    font-weight: 600; font-size: 14px;
  }
  button.primary:hover { opacity: 0.9; }
  button.primary:disabled { opacity: 0.5; cursor: wait; }
  .response { margin-top: 18px; padding: 14px; background: #0b1220; border-radius: 6px; }
  .response h3 { margin: 0 0 8px; font-size: 16px; color: var(--accent); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); color: var(--muted); font-weight: 500; }
  td { padding: 8px; vertical-align: top; border-bottom: 1px solid #1e293b; }
  .chip { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .chip.in_stock { background: rgba(74,222,128,0.2); color: var(--ok); }
  .chip.out_of_stock { background: rgba(251,191,36,0.2); color: var(--warn); }
  .chip.not_carried { background: rgba(248,113,113,0.2); color: var(--err); }
  .muted { color: var(--muted); font-size: 12px; }
  .disclaimer {
    margin-top: 14px; padding: 10px 12px; background: rgba(251,191,36,0.1);
    border-left: 3px solid var(--warn); color: #fde68a; border-radius: 3px; font-size: 12.5px;
  }
  .redflag {
    margin-top: 8px; padding: 10px 12px; background: rgba(248,113,113,0.1);
    border-left: 3px solid var(--err); color: #fecaca; border-radius: 3px;
  }
  .error { color: var(--err); font-weight: 600; padding: 8px; }
  details { margin-top: 14px; }
  summary { cursor: pointer; color: var(--muted); font-size: 13px; }
  details pre {
    margin-top: 8px; padding: 10px; background: #020617; color: #cbd5e1;
    border-radius: 4px; overflow-x: auto; font-size: 12px;
  }
  .suggestion {
    margin: 10px 0; padding: 10px 12px; background: #020617; border-radius: 4px;
  }
  .suggestion ul { margin: 6px 0 0 18px; padding: 0; }
  .suggestion li { margin: 2px 0; font-size: 13px; }
  .patient-row {
    display: flex; gap: 14px; margin-top: 12px; flex-wrap: wrap; align-items: flex-end;
  }
  .patient-row input[type="number"], .patient-row input[type="text"] {
    padding: 8px 10px; background: #0b1220; color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px; font-size: 13px;
  }
  .patient-row label { margin: 0 0 4px; }
  .inline-check { display: flex !important; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; color: var(--fg); padding: 8px 0; }
  .parsed-box {
    margin-bottom: 14px; padding: 10px 12px; background: #020617;
    border-left: 3px solid var(--accent); border-radius: 3px;
  }
  .parsed-box h3 { margin: 0 0 6px; font-size: 13px; color: var(--accent); }
  .parsed-box .kv { font-size: 12.5px; color: var(--muted); margin: 2px 0; }
  .parsed-box .kv b { color: var(--fg); font-weight: 500; }
  .intent-chip {
    display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 11px;
    font-weight: 600; background: rgba(56,189,248,0.2); color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .resolution-chip { padding: 1px 6px; border-radius: 3px; font-size: 10.5px; margin-left: 4px; }
  .resolution-chip.brand_exact { background: rgba(74,222,128,0.2); color: var(--ok); }
  .resolution-chip.brand_fuzzy { background: rgba(251,191,36,0.2); color: var(--warn); }
  .resolution-chip.inn_form    { background: rgba(56,189,248,0.2); color: var(--accent); }
  .resolution-chip.unresolved  { background: rgba(248,113,113,0.2); color: var(--err); }
  .transcript {
    max-height: 340px; overflow-y: auto; padding: 6px; background: #020617;
    border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px;
  }
  .transcript:empty { display: none; }
  .bubble {
    padding: 8px 12px; border-radius: 10px; margin: 6px 0; max-width: 90%;
    font-size: 13.5px; white-space: pre-wrap; line-height: 1.4;
  }
  .bubble.user { background: #1e3a8a; color: #dbeafe; margin-left: auto; border-bottom-right-radius: 2px; }
  .bubble.assistant { background: #1e293b; color: var(--fg); border-bottom-left-radius: 2px; }
  .bubble.system { background: rgba(251,191,36,0.1); color: #fde68a; font-style: italic; }
  .option-list { margin: 8px 0 0; padding: 0; list-style: none; }
  .option-list li {
    padding: 4px 8px; margin: 3px 0; background: #0b1220; border-radius: 4px;
    font-size: 12.5px; border-left: 2px solid var(--accent); cursor: pointer;
  }
  .option-list li:hover { background: #17233a; }
  .option-list b { color: var(--accent); }
  .session-bar {
    display: flex; gap: 10px; align-items: center; margin: 6px 0 2px;
    font-size: 12px; color: var(--muted);
  }
  .session-bar .pill { padding: 2px 8px; background: #1e293b; border-radius: 10px; font-family: Menlo, monospace; font-size: 11px; }
  .session-bar button {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .session-bar button:hover { color: var(--fg); border-color: var(--accent); }
</style>
</head>
<body>
<h1>Pharmacy Sales Agent — Test UI</h1>
<div class="sub">Trợ lý nhà thuốc tiếng Việt · endpoints <code>/chat</code> · <code>/prescriptions/check</code> · <code>/symptoms/advise</code></div>

<div class="tabs">
  <div class="tab active" data-tab="chat" onclick="showTab('chat')">💬 Chat (NLU)</div>
  <div class="tab" data-tab="rx" onclick="showTab('rx')">Kiểm đơn thuốc</div>
  <div class="tab" data-tab="sym" onclick="showTab('sym')">Tư vấn triệu chứng</div>
</div>

<div class="panel active" id="panel-chat">
  <div class="example-row">
    <span class="muted">Ví dụ:</span>
    <button class="example-btn" onclick="loadChat('rx_panadol')">Đơn Panadol</button>
    <button class="example-btn" onclick="loadChat('rx_mixed')">Đơn 3 thuốc</button>
    <button class="example-btn" onclick="loadChat('rx_ambiguous')">Amoxicillin 500mg (ambiguous)</button>
    <button class="example-btn" onclick="loadChat('sym_flu')">Cảm cúm người lớn</button>
    <button class="example-btn" onclick="loadChat('sym_infant')">Trẻ 2 tháng sốt</button>
    <button class="example-btn" onclick="loadChat('sym_pregnancy')">Phụ nữ có thai</button>
    <button class="example-btn" onclick="loadChat('sym_dyspnea')">Khó thở (red flag)</button>
  </div>

  <div class="session-bar">
    <span id="chat-session-label">Phiên mới</span>
    <span id="chat-session-id" class="pill" style="display:none"></span>
    <button id="chat-reset" type="button" onclick="resetChat()">Bắt đầu hội thoại mới</button>
  </div>

  <div class="transcript" id="chat-transcript"></div>

  <label id="chat-label">Đoạn văn tiếng Việt (đơn thuốc hoặc mô tả triệu chứng)</label>
  <textarea id="chat-raw" style="min-height:90px;font-family:inherit;font-size:14px"></textarea>
  <div class="patient-row" id="chat-patient-row">
    <div>
      <label>Tuổi (tuỳ chọn)</label>
      <input id="chat-age" type="number" step="0.1" min="0" max="130" placeholder="vd 28">
    </div>
    <div>
      <label>&nbsp;</label>
      <label class="inline-check"><input id="chat-preg" type="checkbox"> Đang mang thai</label>
    </div>
    <div style="flex:1;min-width:200px">
      <label>Dị ứng (phân cách bằng dấu phẩy)</label>
      <input id="chat-allergies" type="text" placeholder="penicillin, ibuprofen">
    </div>
  </div>
  <button class="primary" id="chat-submit" onclick="submitChat()">Gửi POST /chat</button>
  <div id="chat-response"></div>
</div>

<div class="panel" id="panel-rx">
  <div class="example-row">
    <span class="muted">Ví dụ:</span>
    <button class="example-btn" onclick="loadRx('panadol_oos')">Panadol hết hàng</button>
    <button class="example-btn" onclick="loadRx('mixed')">Đơn 3 item (mixed)</button>
    <button class="example-btn" onclick="loadRx('cefixime')">Cefixime không kinh doanh</button>
  </div>
  <label>Request body (JSON)</label>
  <textarea id="rx-request"></textarea>
  <button class="primary" id="rx-submit" onclick="submitRx()">Gửi POST /prescriptions/check</button>
  <div id="rx-response"></div>
</div>

<div class="panel" id="panel-sym">
  <div class="example-row">
    <span class="muted">Ví dụ:</span>
    <button class="example-btn" onclick="loadSym('flu')">Cảm cúm người lớn</button>
    <button class="example-btn" onclick="loadSym('infant_fever')">Trẻ 2 tháng sốt</button>
    <button class="example-btn" onclick="loadSym('diarrhea')">Tiêu chảy nhẹ</button>
    <button class="example-btn" onclick="loadSym('pregnancy')">Phụ nữ có thai</button>
    <button class="example-btn" onclick="loadSym('dyspnea')">Khó thở (red flag)</button>
  </div>
  <label>Request body (JSON)</label>
  <textarea id="sym-request"></textarea>
  <button class="primary" id="sym-submit" onclick="submitSym()">Gửi POST /symptoms/advise</button>
  <div id="sym-response"></div>
</div>

<script>
const RX = {
  panadol_oos: {
    patient: { age_years: 34, pregnancy: false, allergies: [] },
    items: [
      { drug_name: "Panadol 500mg", active_ingredient: "paracetamol", strength: "500mg",
        dosage_form: "viên nén", quantity: 20, dosage_instruction: "1 viên x 3 lần/ngày khi sốt" }
    ]
  },
  mixed: {
    patient: { age_years: 34, pregnancy: false, allergies: [] },
    items: [
      { drug_name: "Panadol 500mg", active_ingredient: "paracetamol", strength: "500mg",
        dosage_form: "viên nén", quantity: 20, dosage_instruction: "1 viên x 3 lần/ngày sau ăn" },
      { drug_name: "Amoxicillin 500mg", active_ingredient: "amoxicillin", strength: "500mg",
        dosage_form: "viên nang", quantity: 21, dosage_instruction: "1 viên x 3 lần/ngày" },
      { drug_name: "Bromhexin 8mg", active_ingredient: "bromhexine", strength: "8mg",
        dosage_form: "viên nén", quantity: 30, dosage_instruction: "1 viên x 3 lần/ngày" }
    ]
  },
  cefixime: {
    patient: { age_years: 45, pregnancy: false, allergies: ["penicillin"] },
    items: [
      { drug_name: "Cefixime 200mg", active_ingredient: "cefixime", strength: "200mg",
        dosage_form: "viên nang", quantity: 10 }
    ]
  }
};
const SYM = {
  flu:          { patient: { age_years: 28, pregnancy: false, allergies: [] }, symptoms_vi: ["sốt nhẹ", "sổ mũi", "đau họng"], duration_days: 1 },
  infant_fever: { patient: { age_years: 0.17, pregnancy: false, allergies: [] }, symptoms_vi: ["sốt"], duration_days: 1 },
  diarrhea:     { patient: { age_years: 35, pregnancy: false, allergies: [] }, symptoms_vi: ["tiêu chảy", "đau bụng nhẹ"], duration_days: 1 },
  pregnancy:    { patient: { age_years: 30, pregnancy: true, allergies: [] }, symptoms_vi: ["sổ mũi", "hắt hơi"], duration_days: 2 },
  dyspnea:      { patient: { age_years: 55, pregnancy: false, allergies: [] }, symptoms_vi: ["khó thở", "đau ngực"], duration_days: 0 }
};

const CHAT_EXAMPLES = {
  rx_panadol:    { text: "Panadol 500mg, 1 viên x 3 lần/ngày x 5 ngày", age: 34 },
  rx_mixed:      { text: "Panadol 500mg 1 viên x 3 lần/ngày x 5 ngày; Amoxicillin 500mg 1 viên x 3 lần/ngày x 7 ngày; Bromhexin 8mg 1 viên x 3 lần/ngày x 5 ngày", age: 34 },
  rx_ambiguous:  { text: "Amoxicillin 500mg 1 viên x 3 lần/ngày x 7 ngày", age: 34 },
  sym_flu:       { text: "Khách 28 tuổi bị sốt nhẹ, sổ mũi, đau họng 1 ngày nay", age: 28 },
  sym_infant:    { text: "Bé 2 tháng tuổi bị sốt", age: 0.17 },
  sym_pregnancy: { text: "Phụ nữ 30 tuổi đang mang thai bị sổ mũi, hắt hơi 2 ngày", age: 30, preg: true },
  sym_dyspnea:   { text: "Người 55 tuổi bị khó thở, đau ngực", age: 55 }
};

// Chat session state (client-side).
let chatSessionId = null;
// Track the pending clarification so the UI can hint and options list.
let chatPending = null;

function showTab(t) {
  document.querySelectorAll('.tab').forEach(e => e.classList.toggle('active', e.dataset.tab === t));
  document.querySelectorAll('.panel').forEach(e => e.classList.toggle('active', e.id === 'panel-' + t));
}
function loadRx(k)  { document.getElementById('rx-request').value  = JSON.stringify(RX[k],  null, 2); }
function loadSym(k) { document.getElementById('sym-request').value = JSON.stringify(SYM[k], null, 2); }
function loadChat(k) {
  // Clicking an example abandons the current multi-turn session.
  resetChat();
  const e = CHAT_EXAMPLES[k];
  document.getElementById('chat-raw').value = e.text;
  document.getElementById('chat-age').value = e.age != null ? e.age : '';
  document.getElementById('chat-preg').checked = !!e.preg;
  document.getElementById('chat-allergies').value = e.allergies || '';
}

function resetChat() {
  chatSessionId = null;
  chatPending = null;
  document.getElementById('chat-transcript').innerHTML = '';
  document.getElementById('chat-response').innerHTML = '';
  document.getElementById('chat-raw').value = '';
  syncChatBar();
}

function syncChatBar() {
  const label = document.getElementById('chat-session-label');
  const pill  = document.getElementById('chat-session-id');
  const reset = document.getElementById('chat-reset');
  const patientRow = document.getElementById('chat-patient-row');
  const chatLabel = document.getElementById('chat-label');
  if (chatSessionId) {
    label.textContent = 'Đang trong phiên — session_id:';
    pill.textContent = chatSessionId.slice(0, 8) + '…';
    pill.style.display = '';
    reset.style.display = '';
    // Hide patient inputs during clarification turns (request wins LLM once).
    patientRow.style.display = 'none';
    chatLabel.textContent = 'Câu trả lời của bạn (số thứ tự hoặc tên brand):';
  } else {
    label.textContent = 'Phiên mới';
    pill.style.display = 'none';
    reset.style.display = '';
    patientRow.style.display = '';
    chatLabel.textContent = 'Đoạn văn tiếng Việt (đơn thuốc hoặc mô tả triệu chứng)';
  }
}

function appendBubble(kind, html) {
  const t = document.getElementById('chat-transcript');
  const div = document.createElement('div');
  div.className = 'bubble ' + kind;
  div.innerHTML = html;
  t.appendChild(div);
  t.scrollTop = t.scrollHeight;
}
loadRx('panadol_oos');
loadSym('flu');
loadChat('rx_ambiguous');
syncChatBar();

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function postJson(url, body) {
  const r = await fetch(url, {
    method: 'POST', headers: { 'content-type': 'application/json' }, body
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data?.detail ? JSON.stringify(data.detail) : `HTTP ${r.status}`);
  return data;
}

async function submitRx() {
  const btn = document.getElementById('rx-submit');
  const out = document.getElementById('rx-response');
  out.innerHTML = '<div class="response"><em>Đang gửi…</em></div>';
  btn.disabled = true;
  try {
    const body = document.getElementById('rx-request').value;
    JSON.parse(body);
    const data = await postJson('/prescriptions/check', body);
    renderRx(out, data);
  } catch (e) {
    out.innerHTML = '<div class="response"><div class="error">Error: ' + esc(e.message) + '</div></div>';
  } finally {
    btn.disabled = false;
  }
}

async function submitSym() {
  const btn = document.getElementById('sym-submit');
  const out = document.getElementById('sym-response');
  out.innerHTML = '<div class="response"><em>Đang gửi…</em></div>';
  btn.disabled = true;
  try {
    const body = document.getElementById('sym-request').value;
    JSON.parse(body);
    const data = await postJson('/symptoms/advise', body);
    renderSym(out, data);
  } catch (e) {
    out.innerHTML = '<div class="response"><div class="error">Error: ' + esc(e.message) + '</div></div>';
  } finally {
    btn.disabled = false;
  }
}

function rxBody(data) {
  let h = '<h3>Kết quả kiểm đơn</h3>';
  h += '<table><thead><tr><th>Thuốc</th><th>Trạng thái</th><th>Tồn kho</th><th>Thay thế</th><th>Cảnh báo</th></tr></thead><tbody>';
  for (const r of data.items || []) {
    const subs = (r.substitutes || []).map(s =>
      `<div>• <b>${esc(s.name_vi)}</b> <span class="muted">(${esc(s.kind)}, còn ${s.qty_on_hand})</span></div>`
    ).join('') || '<span class="muted">-</span>';
    const notes = (r.safety_notes || []).map(n => `<div>⚠ ${esc(n)}</div>`).join('') || '<span class="muted">-</span>';
    h += `<tr>
      <td><b>${esc(r.item.drug_name)}</b><br><span class="muted">${esc(r.item.active_ingredient)} · ${esc(r.item.strength)} · ${esc(r.item.dosage_form)}</span></td>
      <td><span class="chip ${esc(r.status)}">${esc(r.status)}</span></td>
      <td>${r.qty_on_hand}</td>
      <td>${subs}</td>
      <td>${notes}</td>
    </tr>`;
  }
  h += '</tbody></table>';
  if (data.summary_vi) h += '<h3 style="margin-top:16px">Tóm tắt</h3><div style="white-space:pre-wrap;font-size:13.5px">' + esc(data.summary_vi) + '</div>';
  if (data.disclaimer) h += '<div class="disclaimer">' + esc(data.disclaimer) + '</div>';
  return h;
}

function symBody(data) {
  let h = '';
  if ((data.red_flags || []).length) {
    h += '<h3 style="color:var(--err)">🚩 Red flags</h3>';
    for (const f of data.red_flags) h += '<div class="redflag">' + esc(f) + '</div>';
  }
  if ((data.suggestions || []).length) {
    h += '<h3 style="margin-top:14px">Gợi ý OTC</h3>';
    for (const s of data.suggestions) {
      h += '<div class="suggestion"><b>' + esc(s.name_vi) + '</b> <span class="muted">(score=' + s.score.toFixed(2) + ')</span><ul>';
      for (const it of s.items) {
        const age = it.age_rule_vi ? ' <span class="muted">(' + esc(it.age_rule_vi) + ')</span>' : '';
        h += '<li><b>' + esc(it.active_ingredient) + '</b> — ' + esc(it.dose_per_take_vi)
          + ' × ' + it.frequency_per_day + '/ngày × ' + it.duration_days + ' ngày' + age + '</li>';
      }
      h += '</ul>';
      if ((s.warnings || []).length) {
        h += '<div class="muted" style="margin-top:6px">Lưu ý: ' + s.warnings.map(esc).join('; ') + '</div>';
      }
      h += '</div>';
    }
  }
  if (data.summary_vi) h += '<h3 style="margin-top:14px">Tư vấn</h3><div style="white-space:pre-wrap;font-size:13.5px">' + esc(data.summary_vi) + '</div>';
  if (data.disclaimer) h += '<div class="disclaimer">' + esc(data.disclaimer) + '</div>';
  return h;
}

function renderRx(out, data) {
  out.innerHTML = '<div class="response">' + rxBody(data)
    + '<details><summary>Raw JSON</summary><pre>' + esc(JSON.stringify(data, null, 2)) + '</pre></details></div>';
}

function renderSym(out, data) {
  out.innerHTML = '<div class="response">' + symBody(data)
    + '<details><summary>Raw JSON</summary><pre>' + esc(JSON.stringify(data, null, 2)) + '</pre></details></div>';
}

function parsedBox(parsed) {
  if (!parsed) return '';
  let h = '<div class="parsed-box"><h3>Đã hiểu như sau <span class="intent-chip">' + esc(parsed.intent) + '</span></h3>';
  const po = parsed.patient_overrides || {};
  const poBits = [];
  if (po.age_years != null)   poBits.push('tuổi=' + esc(po.age_years));
  if (po.pregnancy != null)   poBits.push('mang thai=' + (po.pregnancy ? 'có' : 'không'));
  if ((po.allergies || []).length) poBits.push('dị ứng=[' + po.allergies.map(esc).join(', ') + ']');
  if (poBits.length) h += '<div class="kv">LLM suy ra: ' + poBits.join(' · ') + '</div>';

  if (parsed.intent === 'prescription' && (parsed.prescription_items || []).length) {
    h += '<div class="kv"><b>Thuốc trích:</b></div>';
    for (let i = 0; i < parsed.prescription_items.length; i++) {
      const it = parsed.prescription_items[i];
      const res = (parsed.resolutions || [])[i];
      let chip = '';
      if (res && res.resolution) {
        chip = '<span class="resolution-chip ' + esc(res.resolution) + '">' + esc(res.resolution) + '</span>';
        if (res.name_vi && res.resolution !== 'unresolved') {
          chip += ' <span class="muted">→ ' + esc(res.name_vi) + '</span>';
        }
      }
      const parts = [it.brand, it.active_ingredient, it.strength, it.dosage_form].filter(Boolean).map(esc).join(' · ');
      const dose = it.dosage_instruction ? ' — ' + esc(it.dosage_instruction) : '';
      h += '<div class="kv">• ' + parts + ' · SL=' + (it.quantity || 0) + dose + ' ' + chip + '</div>';
    }
  }
  if (parsed.intent === 'symptom') {
    if ((parsed.symptoms_vi || []).length) {
      h += '<div class="kv"><b>Triệu chứng:</b> ' + parsed.symptoms_vi.map(esc).join(', ') + '</div>';
    }
    if (parsed.duration_days != null) {
      h += '<div class="kv"><b>Thời gian:</b> ' + parsed.duration_days + ' ngày</div>';
    }
  }
  h += '</div>';
  return h;
}

function renderChat(out, data) {
  const body = data.flow === 'prescription' ? rxBody(data) : symBody(data);
  out.innerHTML = '<div class="response">' + parsedBox(data.parsed) + body
    + '<details><summary>Raw JSON</summary><pre>' + esc(JSON.stringify(data, null, 2)) + '</pre></details></div>';
}

async function submitChat() {
  const btn = document.getElementById('chat-submit');
  const out = document.getElementById('chat-response');
  const rawEl = document.getElementById('chat-raw');
  const raw = rawEl.value.trim();
  if (!raw) {
    out.innerHTML = '<div class="response"><div class="error">Vui lòng nhập đoạn văn.</div></div>';
    return;
  }
  btn.disabled = true;
  out.innerHTML = '';
  appendBubble('user', esc(raw));
  rawEl.value = '';

  try {
    const payload = { raw_text: raw };
    if (chatSessionId) {
      payload.session_id = chatSessionId;
    } else {
      const ageVal = document.getElementById('chat-age').value;
      const preg = document.getElementById('chat-preg').checked;
      const allergies = document.getElementById('chat-allergies').value
        .split(',').map(s => s.trim()).filter(Boolean);
      const patient = {};
      if (ageVal !== '') patient.age_years = parseFloat(ageVal);
      patient.pregnancy = preg;
      patient.allergies = allergies;
      payload.patient = patient;
    }
    const data = await postJson('/chat', JSON.stringify(payload));
    handleChatResponse(out, data);
  } catch (e) {
    appendBubble('system', 'Lỗi: ' + esc(e.message));
  } finally {
    btn.disabled = false;
    rawEl.focus();
  }
}

function handleChatResponse(out, data) {
  if (data.status === 'awaiting_clarification') {
    chatSessionId = data.session_id;
    chatPending = data.clarification;
    appendBubble('assistant', clarificationBubble(data.clarification, data.parsed));
    syncChatBar();
    return;
  }
  // status === complete -> render full result + close session.
  chatSessionId = null;
  chatPending = null;
  const assistantSummary = data.summary_vi
    ? ('<b>Trả lời:</b>\n' + esc(data.summary_vi))
    : 'Đã xử lý xong.';
  appendBubble('assistant', assistantSummary);
  const body = data.flow === 'prescription' ? rxBody(data) : symBody(data);
  out.innerHTML = '<div class="response">' + parsedBox(data.parsed) + body
    + '<details><summary>Raw JSON</summary><pre>' + esc(JSON.stringify(data, null, 2)) + '</pre></details></div>';
  syncChatBar();
}

function clarificationBubble(c, parsed) {
  const parsedHint = parsed && parsed.intent ? '<div class="muted" style="margin-bottom:6px">Đã hiểu ý: <span class="intent-chip">' + esc(parsed.intent) + '</span></div>' : '';
  let h = parsedHint + '<b>' + esc(c.question_vi) + '</b>';
  if (c.kind === 'ambiguous' && (c.options || []).length) {
    h += '<ul class="option-list">';
    c.options.forEach((opt, i) => {
      h += '<li onclick="pickOption(' + (i + 1) + ')"><b>' + (i + 1) + '.</b> '
        + esc(opt.name_vi) + ' <span class="muted">(' + esc(opt.strength) + ' · ' + esc(opt.dosage_form)
        + ' · còn ' + opt.qty_on_hand + ')</span></li>';
    });
    h += '</ul><div class="muted" style="margin-top:4px">Nhập số thứ tự, tên brand, hoặc SKU.</div>';
  } else if (c.kind === 'unresolved') {
    h += '<div class="muted" style="margin-top:4px">Mục: ' + esc(c.item_summary) + '</div>';
  }
  return h;
}

function pickOption(n) {
  document.getElementById('chat-raw').value = String(n);
  submitChat();
}
</script>
